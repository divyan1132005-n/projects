<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#0d1117;
        color:#c9d1d9;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .container{
        width:400px;
        background:#161b22;
        padding:30px;
        border-radius:10px;
        border:1px solid #30363d;
        box-shadow:0 4px 15px rgba(0,0,0,0.3);
    }

    .logo{
        text-align:center;
        font-size:32px;
        margin-bottom:20px;
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    .form-group{
        margin-bottom:15px;
    }

    label{
        display:block;
        margin-bottom:6px;
        font-size:14px;
    }

    input{
        width:100%;
        padding:10px;
        border:1px solid #30363d;
        border-radius:6px;
        background:#0d1117;
        color:white;
        outline:none;
    }

    input:focus{
        border-color:#58a6ff;
    }

    button{
        width:100%;
        padding:12px;
        background:#238636;
        color:white;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-size:15px;
        font-weight:bold;
    }

    button:hover{
        background:#2ea043;
    }

    .footer{
        margin-top:15px;
        text-align:center;
        font-size:14px;
    }

    .footer a{
        color:#58a6ff;
        text-decoration:none;
    }

    .footer a:hover{
        text-decoration:underline;
    }
</style>
</head>
<body>

<div class="container">
    <div class="logo">🐙</div>

    <h2>Create your account</h2>

    <form>
        <div class="form-group">
            <label>Username</label>
            <input type="text" placeholder="Enter username" required>
        </div>

        <div class="form-group">
            <label>Email address</label>
            <input type="email" placeholder="Enter email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Create password" required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password" required>
        </div>

        <button type="submit">Create Account</button>
    </form>

    <div class="footer">
        Already have an account?
        <a href="#">Sign in</a>
    </div>
</div>

</body>
</html>
